services:
  gateway:
    build:
      context: ./nginx/
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - 8080:80
    volumes:
      - static:/static
      - media:/media

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      SECRET_KEY: "${SECRET_KEY}"
      DEBUG: "1"
    volumes:
      - static:/code/collected_static/
      - media:/code/media

  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    volumes:
      - static:/app/build

  postgres:
    image: postgres:13
    ports:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  static:
  media:
