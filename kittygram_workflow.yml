# .github/workflows/main.yml
name: Main workflow

on:
  push:
    branches:
      - main

jobs:
  infra:
    name: Infrastructure info
    runs-on: ubuntu-latest
    outputs:
      host: ${{ steps.get_host.outputs.host }}
      user: ${{ steps.get_user.outputs.user }}
    steps:
    - name: Download Artifact
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: infra.yaml
        branch: main
        name: infrastructure-info
        path: .
    - name: Read host from JSON
      id: get_host
      run: |
        VALUE=$(cat deployment.json | jq -r '.host')
        echo "host=$VALUE" >> $GITHUB_OUTPUT
    - name: Read user from JSON
      id: get_user
      run: |
        VALUE=$(cat deployment.json | jq -r '.user')
        echo "user=$VALUE" >> $GITHUB_OUTPUT
    - name: Check host and user
      if: ${{ steps.get_host.outputs.host == 'null' || steps.get_user.outputs.user == 'null' }}
      run: exit 1

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: infra
    steps:
    - name: Check out code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==6.0.0 flake8-isort==6.0.0

    - name: Test with flake8
      run: |
        python -m flake8 backend/

  docker_frontend:
    name: Frontend docker image
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

  docker_backend:
    name: Backend docker image
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

  docker_gateway:
    name: Gateway docker image
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: 
      - docker_frontend
      - docker_backend
      - docker_gateway
      - infra
    steps:
    - uses: actions/checkout@v3

    - name: Create .env file
      run: |
        > .env
        echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
        echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
        echo "DB_HOST=postgres" >> .env
        echo "DB_PORT=5432" >> .env
        echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

    - name: Copy docker-compose.production.yml via ssh
      uses: appleboy/scp-action@master
      with:
        host: ${{ needs.infra.outputs.host }}
        username: ${{ needs.infra.outputs.user }}
        key: ${{ secrets.SSH_KEY }}
        source: ".env,docker-compose.production.yml"
        target: "/srv/"

    - name: Executing remote ssh commands to deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ needs.infra.outputs.host}}
        username: ${{ needs.infra.outputs.user }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /srv/
          docker compose -f docker-compose.production.yml pull
          docker compose -f docker-compose.production.yml up -d --force-recreate --remove-orphans
          docker compose -f docker-compose.production.yml exec backend make migrate collectstatic

  send_message:
    name: Notification
    runs-on: ubuntu-latest
    needs:
      - deploy
      - infra
    steps:
    - name: Send message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: "Kittygram на сервере ${{ needs.infra.outputs.host}}!"
